name: CI

on:
  push:
    branches: [main]
    paths:
      - "Meus Projetos/Agente IA Inteligente/Agent_Stride_Vision/backend/**"
  pull_request:
    branches: [main]
    paths:
      - "Meus Projetos/Agente IA Inteligente/Agent_Stride_Vision/backend/**"

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Meus Projetos/Agente IA Inteligente/Agent_Stride_Vision/backend"

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "Meus Projetos/Agente IA Inteligente/Agent_Stride_Vision/backend/requirements-dev.txt"

      - name: Instalar dependências
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app/

      - name: Testes (pytest)
        env:
          AI_PROVIDER: gemini
          GEMINI_API_KEY: dummy-key-for-ci
        run: pytest tests/ -v