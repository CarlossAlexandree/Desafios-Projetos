<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Carros Usados</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f9f9f9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #fff;
        }
        th, td {
            padding: 12px 15px;
            border: 1px solid #ddd;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        button {
            padding: 6px 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <h1>Grandes Veículos - Venda de Carros Usados</h1>
    
    <table>
        <thead>
            <tr>
                <th>Marca</th>
                <th>Modelo</th>
                <th>Ano</th>
                <th>Preço</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody>
            {% for car in cars %}
            <tr>
                <td>{{ car.brand }}</td>
                <td>{{ car.model }}</td>
                <td>{{ car.year }}</td>
                <td>R$ {{ car.price }}</td>
                <td>
                    <!-- Atributos data-* mapeados para leitura no arquivo car_sales.js -->
                    <button class="buy-button" data-car-name="{{ car.model }}" data-brand-name="{{ car.brand }}">Comprar</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <!-- Inclusão do arquivo JavaScript estático -->
    <script src="{{ url_for('static', filename='car_sales.js') }}"></script>
</body>
</html>
